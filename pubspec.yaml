name: qr_scanner_app
description: A fast, modern QR code and barcode scanner with history and QR generation.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Camera + scanning
  mobile_scanner: ^5.2.3

  # QR generation
  qr_flutter: ^4.1.0

  # Local storage
  sqflite: ^2.3.3
  path: ^1.9.0
  path_provider: ^2.1.4

  # Sharing / clipboard / links
  share_plus: ^10.0.2
  url_launcher: ^6.3.0

  # Permissions
  permission_handler: ^11.3.1

  # State management
  flutter_riverpod: ^2.5.1

  # Utilities
  intl: ^0.19.0
  screenshot: ^3.0.0

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.1
  flutter_native_splash: ^2.4.1

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icons/app_icon.png"
  adaptive_icon_background: "#2F6FED"
  adaptive_icon_foreground: "assets/icons/app_icon_foreground.png"

flutter_native_splash:
  color: "#121212"
  image: assets/icons/splash_logo.png
  android_12:
    image: assets/icons/splash_logo.png
    color: "#121212"

flutter:
  uses-material-design: true

  assets:
    - assets/icons/
    - assets/images/
